# Training Configuration - Dummy/test run
training:
  epochs: 5
  batch_size: 2
  learning_rate: 0.001
  min_lr: 0.00001
  warmup_steps: 5
  scheduler: cosine_warmup
  optimizer: adamw
  weight_decay: 0.0001
  gradient_clip_norm: 5.0
  accumulation_steps: 1
  mixed_precision: false
  seed: 42

  # Checkpointing
  save_every_n_epochs: 2
  keep_last_n_checkpoints: 2
  checkpoint_dir: models/checkpoints

  # Logging
  log_every_n_steps: 1
  use_wandb: false

# Data
data:
  train_manifest: data/manifests/train.json
  val_manifest: data/manifests/val.json
  test_manifest: data/manifests/test.json
  max_duration: 20.0
  min_duration: 0.1
  num_workers: 0
  pin_memory: false

# Augmentation
augmentation:
  spec_augment:
    enabled: false
  speed_perturb:
    enabled: false
  noise_inject:
    enabled: false
