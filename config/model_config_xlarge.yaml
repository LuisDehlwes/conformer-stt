# Model Configuration - Extra Large (~500M params)
# Comparable to Whisper Medium (769M) — our most powerful config
# Hardware: 2x RTX 6000 48GB — fits with batch_size 8-16 + gradient accumulation
model:
  type: conformer_ctc
  encoder:
    num_layers: 24
    d_model: 928
    num_heads: 16
    feed_forward_dim: 3712
    conv_kernel_size: 31
    dropout: 0.1
    input_dim: 80
    subsampling_factor: 4
    subsampling_conv_channels: 1024
  decoder:
    type: ctc
    vocab_size: 29
    blank_id: 0

# Feature Extraction
features:
  type: log_mel
  sample_rate: 16000
  n_mels: 80
  n_fft: 512
  win_length: 400
  hop_length: 160
  f_min: 20.0
  f_max: 8000.0
  normalize: true

# Tokenizer
tokenizer:
  type: character
  vocab_path: null
  lowercase: true
